name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  build-release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Validate backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          python -m compileall backend

      - name: Package release bundle
        run: |
          mkdir -p release
          tar -czf release/repo-health-frontend-dist.tar.gz -C frontend dist
          tar -czf release/repo-health-backend-source.tar.gz backend scripts sdd docker-compose.yml .env.example

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repo-health-release-bundle
          path: release/*

  deploy-frontend-vercel:
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    if: ${{ vars.VERCEL_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy frontend to Vercel
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm ci
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  docker-image-smoke:
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    steps:
      - uses: actions/checkout@v4

      - name: Build deployable Docker images
        run: |
          docker build -t repo-health-backend:${{ github.ref_name }} ./backend
          docker build -t repo-health-frontend:${{ github.ref_name }} ./frontend
