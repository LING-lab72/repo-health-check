version: 2
name: full-stack-test
description: Real backend and frontend test pipeline for GitLink/Jianmu

global:
  concurrent: 1

trigger:
  webhook: gitlink@1.0.0
  event:
    - ref: push
      ruleset-operator: AND

workflow:
  - ref: start
    name: start
    task: start

  - ref: backend_test
    name: backend-test
    image: docker.m.daocloud.io/library/python:3.11-slim
    script:
      - |
        set -eu
        echo "SCRIPT_VERSION_20260626_BACKEND_REAL_TEST"
        python --version

        python - <<'PY'
        import os
        import shutil
        import tarfile
        import urllib.request

        marker = "/tmp/repo-health-ci-path"

        if os.path.exists("backend/requirements.txt"):
            path = os.getcwd()
            print("Using checked-out repository:", path)
            open(marker, "w", encoding="utf-8").write(path)
            raise SystemExit(0)

        urls = [
            "https://codeload.github.com/LING-lab72/repo-health-check/tar.gz/refs/heads/master",
            "https://github.com/LING-lab72/repo-health-check/archive/refs/heads/master.tar.gz",
        ]
        archive = "/tmp/repo-health-check.tar.gz"
        target = "/tmp/repo-health-check-src"

        last_error = None
        for url in urls:
            try:
                print("Downloading source:", url)
                urllib.request.urlretrieve(url, archive)
                last_error = None
                break
            except Exception as exc:
                last_error = exc
                print("Download failed:", exc)

        if last_error is not None:
            raise SystemExit(f"Could not download source: {last_error}")

        shutil.rmtree(target, ignore_errors=True)
        os.makedirs(target, exist_ok=True)
        with tarfile.open(archive, "r:gz") as tar:
            members = tar.getmembers()
            top = members[0].name.split("/")[0] if members else ""
            for member in members:
                if top and member.name.startswith(top + "/"):
                    member.name = member.name[len(top) + 1:]
                if member.name:
                    tar.extract(member, target)

        if not os.path.exists(os.path.join(target, "backend", "requirements.txt")):
            raise SystemExit("Downloaded source does not contain backend/requirements.txt")

        open(marker, "w", encoding="utf-8").write(target)
        print("Source ready:", target)
        PY

        cd "$(cat /tmp/repo-health-ci-path)"
        echo "Project root: $(pwd)"
        export SESSION_SECRET="gitlink-ci-session-secret"
        export PYTHONPATH="$PWD:$PWD/backend"
        export REPO_HEALTH_ROOT="$PWD"
        export REPO_HEALTH_TEST_ROOT="$PWD"

        pip install --disable-pip-version-check -i https://mirrors.aliyun.com/pypi/simple/ --trusted-host mirrors.aliyun.com flake8 pytest -r backend/requirements.txt
        flake8 backend scripts --config backend/.flake8 --extend-ignore=E501
        pytest backend/tests -q
        echo "Backend tests passed"
    needs:
      - start

  - ref: frontend_test
    name: frontend-test
    image: docker.m.daocloud.io/library/node:20
    script:
      - |
        set -eu
        echo "SCRIPT_VERSION_20260626_FRONTEND_REAL_TEST"
        node --version
        npm --version

        if [ -f "frontend/package.json" ]; then
          echo "$(pwd)" > /tmp/repo-health-ci-path
        else
          node - <<'JS'
        const fs = require('fs');
        const https = require('https');
        const { URL } = require('url');

        const urls = [
          'https://codeload.github.com/LING-lab72/repo-health-check/tar.gz/refs/heads/master',
          'https://github.com/LING-lab72/repo-health-check/archive/refs/heads/master.tar.gz',
        ];
        const output = '/tmp/repo-health-check.tar.gz';

        function download(url, redirects = 0) {
          return new Promise((resolve, reject) => {
            const request = https.get(url, (response) => {
              if (response.statusCode >= 300 && response.statusCode < 400 && response.headers.location) {
                if (redirects > 5) {
                  reject(new Error('Too many redirects'));
                  return;
                }
                const next = new URL(response.headers.location, url).toString();
                response.resume();
                resolve(download(next, redirects + 1));
                return;
              }

              if (response.statusCode !== 200) {
                response.resume();
                reject(new Error(`HTTP ${response.statusCode} for ${url}`));
                return;
              }

              const file = fs.createWriteStream(output);
              response.pipe(file);
              file.on('finish', () => file.close(resolve));
              file.on('error', reject);
            });
            request.on('error', reject);
          });
        }

        (async () => {
          let lastError;
          for (const url of urls) {
            try {
              console.log('Downloading source:', url);
              await download(url);
              return;
            } catch (error) {
              lastError = error;
              console.log('Download failed:', error.message);
            }
          }
          throw lastError;
        })().catch((error) => {
          console.error(error);
          process.exit(1);
        });
        JS

          rm -rf /tmp/repo-health-check-src
          mkdir -p /tmp/repo-health-check-src
          tar -xzf /tmp/repo-health-check.tar.gz -C /tmp/repo-health-check-src --strip-components=1
          test -f /tmp/repo-health-check-src/frontend/package.json
          echo "/tmp/repo-health-check-src" > /tmp/repo-health-ci-path
        fi

        cd "$(cat /tmp/repo-health-ci-path)/frontend"
        echo "Frontend root: $(pwd)"
        npm ci --registry=https://registry.npmmirror.com --no-audit --no-fund
        npm run lint
        npm test -- --run
        npm run build
        echo "Frontend tests passed"
    needs:
      - backend_test

  - ref: end
    name: end
    task: end
    needs:
      - frontend_test
