version: 2
name: ci
description: ""
global:
  concurrent: 1
trigger:
  webhook: gitlink@1.0.0
  event:
    - ref: push
      ruleset-operator: AND
workflow:
  - ref: start
    name: 开始
    task: start
  - ref: backend_ci
    name: 后端CI
    image: docker.m.daocloud.io/library/python:3.11-slim
    script:
      - apt-get update && apt-get install -y --no-install-recommends git
        ca-certificates && rm -rf /tmp/repo-health-check && git clone --depth=1
        --branch master https://gitlink.org.cn/LINGQvQ/repo-health-check.git
        /tmp/repo-health-check && cd /tmp/repo-health-check && sh
        devops/gitlink/backend-ci.sh
    needs:
      - start
  - ref: frontend_ci
    name: 前端CI
    image: docker.m.daocloud.io/library/node:20
    script:
      - apt-get update && apt-get install -y --no-install-recommends git
        ca-certificates && rm -rf /tmp/repo-health-check && git clone --depth=1
        --branch master https://gitlink.org.cn/LINGQvQ/repo-health-check.git
        /tmp/repo-health-check && cd /tmp/repo-health-check && sh
        devops/gitlink/frontend-ci.sh
    needs:
      - backend_ci
  - ref: end
    name: 结束
    task: end
    needs:
      - frontend_ci

