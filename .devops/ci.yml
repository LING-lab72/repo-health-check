version: 2
name: ci
description: Fast pass pipeline for GitLink/Jianmu demo

global:
  concurrent: 1

trigger:
  webhook: gitlink@1.0.0
  event:
    - ref: push
      ruleset-operator: AND

workflow:
  - ref: start
    name: start
    task: start

  - ref: backend_ci
    name: backend-ci
    image: docker.m.daocloud.io/library/python:3.11-slim
    script:
      - python --version
      - echo "Backend CI fast-pass OK"
    needs:
      - start

  - ref: frontend_ci
    name: frontend-ci
    image: docker.m.daocloud.io/library/python:3.11-slim
    script:
      - python --version
      - echo "Frontend CI fast-pass OK"
    needs:
      - backend_ci

  - ref: end
    name: end
    task: end
    needs:
      - frontend_ci
