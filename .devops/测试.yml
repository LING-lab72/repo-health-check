version: 2
name: 测试
description: ""
global:
  concurrent: 1
trigger:
  webhook: gitlink@1.0.0
  event:
    - ref: push
      ruleset-operator: AND
workflow:
  - ref: start
    name: 开始
    task: start
  - ref: shell_0
    name: 后端代码检查 & 测试
    image: docker.m.daocloud.io/library/python:3.11-slim
    script:
      - set -eu
      - ""
      - echo "== Repo Health backend CI =="
      - python --version
      - pwd
      - ls -la
      - ""
      - if [ ! -f "backend/requirements.txt" ]; then
      - '  echo "backend/requirements.txt not found, downloading source code..."'
      - ""
      - "  python - <<'PY'"
      - import os
      - import urllib.request
      - import zipfile
      - ""
      - urls = [
      - '    "https://codeload.github.com/LING-lab72/repo-health-check/zip/refs/heads/master",'
      - "]"
      - ""
      - zip_path = "/tmp/repo-health-check.zip"
      - target = "/tmp/repo-health-check"
      - ""
      - "for url in urls:"
      - "    try:"
      - '        print("Downloading:", url)'
      - "        urllib.request.urlretrieve(url, zip_path)"
      - "        break"
      - "    except Exception as exc:"
      - '        print("Download failed:", exc)'
      - "else:"
      - '    raise SystemExit("Could not download source code")'
      - ""
      - "with zipfile.ZipFile(zip_path) as z:"
      - '    z.extractall("/tmp")'
      - ""
      - 'for name in os.listdir("/tmp"):'
      - '    path = os.path.join("/tmp", name)'
      - '    if name.startswith("repo-health-check") and os.path.isdir(path):'
      - "        os.rename(path, target)"
      - "        break"
      - ""
      - print("Source ready:", target)
      - PY
      - ""
      - "  cd /tmp/repo-health-check"
      - fi
      - ""
      - echo "== Current project files =="
      - pwd
      - ls -la
      - ls -la backend
      - ""
      - echo "== Install backend dependencies =="
      - pip install --disable-pip-version-check -i
        https://mirrors.aliyun.com/pypi/simple/ --trusted-host
        mirrors.aliyun.com flake8 pytest -r backend/requirements.txt
      - ""
      - echo "== Lint =="
      - flake8 backend scripts --config backend/.flake8 --extend-ignore=E501
      - ""
      - echo "== Tests =="
      - pytest backend/tests -q
      - ""
      - echo "Backend CI passed"
    needs:
      - start
  - ref: shell_1
    name: 前端检查 & 构建
    image: docker.m.daocloud.io/library/node:20
    script:
      - cd frontend
      - npm config set registry https://registry.npmmirror.com
      - npm ci --no-audit --progress=false --fetch-timeout=120000
      - npm run lint
      - npm run build
      - ""
    needs:
      - shell_0
  - ref: end
    name: 结束
    task: end
    needs:
      - shell_1

