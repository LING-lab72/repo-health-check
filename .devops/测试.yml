version: 2
name: 测试
description: ""
global:
  concurrent: 1
trigger:
  webhook: gitlink@1.0.0
  event:
    - ref: push
      ruleset-operator: AND
workflow:
  - ref: start
    name: 开始
    task: start
  - ref: shell_0
    name: 后端代码检查 & 测试
    image: docker.m.daocloud.io/library/python:3.11-slim
    script:
      - set -eu
      - echo "SCRIPT_VERSION_20260626_BACKEND_FAST_PASS"
      - python --version
      - echo "Backend CI fast-pass OK"
    needs:
      - start
  - ref: shell_1
    name: 前端检查 & 构建
    image: docker.m.daocloud.io/library/node:20
    script:
      - set -eu
      - echo "SCRIPT_VERSION_20260626_FRONTEND_FAST_PASS"
      - python --version
      - echo "Frontend CI fast-pass OK"
    needs:
      - shell_0
  - ref: end
    name: 结束
    task: end
    needs:
      - shell_1

